split:
  test_size: 0.25
  valid_size: 0.20
  random_state: 2018

random_forest:
  n_estimators: 100
  n_jobs: 4
  criterion: "gini"

adaboost:
  n_estimators: 100
  learning_rate: 0.8

xgboost:
  params:
    objective: "binary:logistic"
    eta: 0.039
    max_depth: 2
    subsample: 0.8
    colsample_bytree: 0.9
    eval_metric: "auc"
    random_state: 2018
    verbosity: 0
  max_rounds: 1000
  early_stop: 50
  verbose: 50

lightgbm:
  params:
    boosting_type: "gbdt"
    objective: "binary"
    metric: "auc"
    learning_rate: 0.05
    num_leaves: 15
    max_depth: 4
    min_child_samples: 100
    max_bin: 100
    subsample: 0.9
    subsample_freq: 1
    colsample_bytree: 0.7
    min_child_weight: 0
    min_split_gain: 0
    nthread: 8
    verbose: -1
    scale_pos_weight: 150  # handles class imbalance    
  max_rounds: 1000
  early_stop: 100
  verbose: 50